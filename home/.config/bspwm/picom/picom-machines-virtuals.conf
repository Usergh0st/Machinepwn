# Description: This is a picom configuration for virtual machines
# Like Virtualbox, QEMU, WMWARE.
# Support: Virtual Machines
# =======================================================================

# --=[ General Settings | Global / backend ]=--

# Specify the backend to use
# - xrender
# - glx
# - xr_glx_hybrid
# - egl
backend = "xrender";
use-damage = false;
#log-level = "trace";

# --=[ Vsync and latency ]=--

vsync = false;
dithered-present = false;
max-brightness = 1.0;
unredir-if-possible = true;

# --=[ Windows Detection ]=--

detect-rounded-corners = false;
detect-client-opacity = true;
detect-transient = true;

# --=[ Corners Settings ]=--
corner-radius = 2;

# --=[ Performance / Focus ]=--

xrender-sync-fence = true;
use-ewmh-active-win = false;
no-fading-openclose = true;

# --=[ Fadin Effects ]=--

fading = true;
fade-in-step = 0.08;
fade-out-step = 0.08;
fade-delta = 10;

# --=[ Shadows Settings ]=--

shadow = false;
shadow-radius = 0;
shadow-opacity = 0;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-color = "#000000";

# --=[ Rules Settings ]=--

rules: (

# Global Rules
{
	mark-wmwin-focused = true;
	mark-ovredir-focused = true;
	fade = true;
	shadow = false;
},

# Alacritty behavior and terminal kitty
{
	match = "class_g = 'Alacritty' || class_g = 'st-256color' || class_g = 'kitty'";
	fade = false;

},

# Alacritty behavior with mode floating
{
	match = "class_g = 'Alacritty' || class_g = 'FloaTerm'";
	fade = false;
},

# Alacritty behavior with mode updating it's similar to floating
{
	match = "class_g = 'Alacritty' || class_g = 'Updating'";
	fade = false;
},

# Fullscreen behavior
{
	match = "fullscreen";
	fade = false;
	use-damage = true;
	corner-radius = 0;
},

# Polybar behavior
{
	match = "window_type = 'dock'";
	fade = false;
	corner-radius = 0;
	opacity = 1.0;
	focus = false;
	repaint = true;
},

# Normal windows behavior
{
	match = "window_type = 'normal'";
	use-damage = true;
	fade = true;
},

# Dialog windows behavior
{
	match = "window_type = 'dialog'";
	use-damage = true;
	fade = false;
},

# Tooltip windows behavior
{
	match = "window_type = 'tooltip'";
	corner-radius = 0;
	opacity = 1.0;
	fade = false;
},

# Fix shadows small UI elements.
{
	match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu'";
	corner-radius = 0;
	fade = true;
},

{
        # Fix shadow related bugs on small UI elements
	match = "window_type = 'menu' || role = 'popup' || role = 'bubble'";
        use-damage = true;
	fade = true;
},

# Behavior bspwm-scratchpat
{
	match = "class_g = 'bspwm-scratch' || class_g = 'Updating'";
	use-damage = true;
},

# Global corner radius
{
	match = "class_g = 'Polybar' || class_g = 'eww-bar' || class_g = 'Viewnior' || class_g = 'Rofi' || class_g = 'mpv' || class_g = 'bspwm-scratch' || class_g = 'Dunst' || class_g = 'Retroarch'";
	corner-radius = 0;
},

# Global shadow
{
	match = "name = 'Notification' || class_g ?= 'Notify-osd' || class_g = 'Dunst' || class_g = 'Polybar' || class_g = 'Eww' || class_g = 'jgmenu' || class_g = 'bspwm-scratch' || class_g = 'Spotify' || class_g = 'retroarch' || class_g = 'firefox' || class_g = 'Rofi' || class_g = 'Screenkey' || class_g = 'mpv' || class_g = 'Viewnior' || _GTK_FRAME_EXTENTS@";
	shadow = false;
},

)

