# Description: This is a picom configuration with physical hardware
# Like laptops and other devices.
# Support: physical hardware.
# =======================================================================

# --=[ General Settings | Global / backend ]=--

# Specify the backend to use
# - xrender
# - glx
# - xr_glx_hybrid
# - egl
backend = "egl";
egl-no-stencil = true;
egl-no-config = true;
egl-no-rebind-pixmap = true;
use-damage = true;
# log-level = "warn";      If you want see the logs of picom

# --=[ Vsync and latency ]=--

vsync = true;
dithered-present = true;
vsync-use-glfinish = false;
max-brightness = 1.0;

# --=[ Window Detection ]=--

detect-rounded-corners = true;
detect-client-opacity = false;
detect-transient = false;

# --=[ Shadows Settings ]=--

shadow = true;

shadow-radius = 5;
shadow-opacity = 0.25;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-color = "#000000";

# --=[ Opacity Settings ]=--

# inactive-opacity = 0.92;
frame-opacity = 1.0;

# --=[ Corners Settings ]=--

corner-radius = 2;

# --=[ Performance / Focus ]=--

use-ewmh-active-win = true;

# --=[ Fadin Effects ]=--

fading = true;

fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 4;
no-fading-openclose = false;
no-fading-destroyed-argb = false;

# --=[ Rules Settings And Others Things ]=--

# --=[ Blur Method ]=--

blur:

	{
		method = "box";
		size = 3;
		deviation = 1.8;
	}

# --=[ Rules ]=--

rules: (

# Global Rules
{
	blur-background = false;
	fade = false;
	shadow = true;
	opacity = 1.0;
	use-damage = true;
},

# Alacritty behavior and kitty
{
	match = "class_g = 'Alacritty' || class_g = 'st-256color' || class_g = 'kitty'";
	opacity = 0.97;
	blur-background = true;
	blur-background-frame = true;
	blur-background-fixed = true;
	fade = true;
	shadow = true;
	use-damage = false;
},

# Alacritty behavior with mode floating
{
	match = "class_g = 'Alacritty' || class_g = 'FloaTerm'";
	opacity = 0.97;
	blur-background = true;
	blur-background-frame = true;
	blur-background-fixed = true;
	fade = true;
	shadow = true;
	shadow-radius = 7;
	shadow-opacity = 0.15;
	shadow-offset-x = -7;
	shadow-offset-y = -7;
	use-damage = false;
},

# Alacritty behavior with mode updating it's similar to floating
{
	match = "class_g = 'Alacritty' || class_g = 'Updating'";
	opacity = 0.97;
	blur-background = true;
	blur-background-frame = true;
	blur-background-fixed = true;
	fade = true;
	shadow = true;
	shadow-radius = 7;
	shadow-opacity = 0.6;
	shadow-offset-x = -7;
	shadow-offset-y = -7;
	use-damage = false;
},

# Fullscreen behavior
{
	match = "fullscreen";
	corner-radius = 0;
	blur-background = false;
	shadow = false;
	fade = false;
	opacity = 1.0;
	use-damage = true;
},

# Polybar behavior
{
	match = "window_type = 'dock'";
	corner-radius = 0;
	fade = false;
	blur-background = false;
	shadow = false;
	use-damage = false;
},

# Normal windows behavior
{
	match = "window_type = 'normal'";
	fade = true;
	shadow = false;
},

# Dialog windows behavior
{
	match = "window_type = 'dialog'";
	shadow = false;
	fade = true;
	fade-in-step = 0.03;
	fade-out-step = 0.03;
	fade-delta = 5;
},

# Tooltip windows behavior
{
	match = "window_type = 'tooltip'";
	corner-radius = 0;
	opacity = 0.90;
	fade = true;
	fade-in-step = 0.03;
	fade-out-step = 0.03;
	fade-delta = 5;
	shadow = false;
},

# Fix shadows small UI elements.
{
	match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu'";
	corner-radius = 0;
	shadow = false;
},

{
        # Fix shadow related bugs on small UI elements
	match = "window_type = 'menu' || role = 'popup' || role = 'bubble'";
        shadow = false;
},

# Behavior bspwm-scratchpat
{
	match = "class_g = 'bspwm-scratch' || class_g = 'Updating'";
	opacity = 0.97;
	blur-background = true;
	blur-background-fixed = true;
},

# Global corner radius
{
	match = "class_g = 'Polybar' || class_g = 'eww-bar' || class_g = 'Viewnior' || class_g = 'Rofi' || class_g = 'mpv' || class_g = 'bspwm-scratch' || class_g = 'Dunst' || class_g = 'Retroarch'";
	corner-radius = 0;
},

# Global shadow
{
	match = "name = 'Notification' || class_g ?= 'Notify-osd' || class_g = 'Dunst' || class_g = 'Polybar' || class_g = 'Eww' || class_g = 'jgmenu' || class_g = 'bspwm-scratch' || class_g = 'Spotify' || class_g = 'retroarch' || class_g = 'firefox' || class_g = 'Rofi' || class_g = 'Screenkey' || class_g = 'mpv' || class_g = 'Viewnior' || _GTK_FRAME_EXTENTS@";
	shadow = false;
},

# Include picom animations feature
@include "picom-animations-with-physical-hardware.conf"

)
